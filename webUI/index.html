<!DOCTYPE html>
<html lang="en">
    <head>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Web UI - Numbers AI</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1>WEB UI - NUMBERS AI</h1>

        </form>
        <p></p>
        <h3>Model Output: <span id="modelOutput">–</span></h3>
        <!-- id="modelOutput" ist neu – script.js schreibt den Output hier rein -->
        <script src="script.js"></script>
    </body>
</html>
